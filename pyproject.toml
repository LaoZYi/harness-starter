[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-harness-starter"
version = "0.1.0"
description = "A production-oriented starter repository for an AI agent-friendly Python service."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "OpenAI Codex" }]

[tool.setuptools.packages.find]
where = ["src"]
